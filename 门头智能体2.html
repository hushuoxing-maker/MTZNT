<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>商业门头设计AI · 布局时间版</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: radial-gradient(circle at 20% 20%, #f8f0f8, #f0eef4);
      min-height: 100vh;
      padding: 25px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .header {
      text-align: center;
      margin-bottom: 25px;
    }
    .header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #b388eb, #e786a7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .header p {
      color: #7b6b82;
      font-size: 0.95rem;
      font-weight: 500;
    }
    .main-layout {
      display: flex;
      gap: 20px;
      width: 100%;
      max-width: 1400px;
      align-items: flex-start;
    }
    .left-panel {
      flex: 1;
      max-width: 560px;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-radius: 32px;
      padding: 30px 28px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.06), 0 0 0 1px rgba(255,255,255,0.5) inset;
      border: 1px solid rgba(200,180,210,0.3);
      position: sticky;
      top: 20px;
      max-height: 95vh;
      overflow-y: auto;
    }
    .right-panel {
      flex: 1.2;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-radius: 32px;
      padding: 30px 28px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.06), 0 0 0 1px rgba(255,255,255,0.5) inset;
      border: 1px solid rgba(200,180,210,0.3);
    }
    .right-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .right-header h3 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #5e4b6b;
    }
    .stats-badge {
      background: rgba(185,131,255,0.12);
      color: #7c3aed;
      font-size: 0.75rem;
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: 600;
    }
    .brand-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      background: rgba(255,255,255,0.6);
      border-radius: 18px;
      padding: 6px 6px 6px 20px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(200,170,200,0.3);
    }
    .brand-row label {
      font-weight: 600;
      color: #5e4b6b;
      white-space: nowrap;
      font-size: 0.85rem;
    }
    .brand-row input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 1rem;
      padding: 12px 5px;
      outline: none;
      color: #2e1e33;
      font-weight: 500;
    }
    .brand-row input::placeholder { color: #bcacc4; }
    .subtitle-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      background: rgba(255,255,255,0.55);
      border-radius: 18px;
      padding: 6px 6px 6px 20px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(200,170,200,0.3);
    }
    .subtitle-row label {
      font-weight: 600;
      color: #5e4b6b;
      white-space: nowrap;
      font-size: 0.85rem;
    }
    .subtitle-row input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 0.95rem;
      padding: 12px 5px;
      outline: none;
      color: #2e1e33;
    }
    .category-section {
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #8b6f9a;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .section-title span {
      background: #efe4f5;
      padding: 2px 8px;
      border-radius: 16px;
      font-size: 0.65rem;
      color: #7b5e8c;
      white-space: nowrap;
    }
    .multi-hint {
      font-size: 0.65rem;
      color: #b0a0b5;
      margin-left: 4px;
    }
    .industry-block {
      margin-bottom: 14px;
    }
    .industry-label {
      display: inline-block;
      font-weight: 700;
      font-size: 0.8rem;
      color: #4a3a53;
      background: rgba(235,220,245,0.6);
      padding: 4px 12px;
      border-radius: 16px;
      margin-bottom: 6px;
      letter-spacing: 0.4px;
    }
    .sub-btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-left: 2px;
    }
    .option-btn {
      padding: 6px 13px;
      border-radius: 24px;
      border: 1px solid #e2d4ea;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(8px);
      font-size: 0.78rem;
      font-weight: 500;
      color: #4a3a53;
      cursor: pointer;
      transition: all 0.25s ease;
      white-space: nowrap;
      letter-spacing: 0.3px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
    }
    .option-btn:hover {
      background: rgba(255,240,250,0.9);
      border-color: #d0a0d8;
      transform: translateY(-1px);
      box-shadow: 0 8px 15px rgba(180,120,200,0.15);
    }
    .option-btn.selected {
      background: linear-gradient(135deg, #b983ff, #e786a7);
      color: white;
      border-color: transparent;
      font-weight: 600;
      box-shadow: 0 8px 18px rgba(185,131,255,0.3);
      transform: scale(1.02);
    }
    .style-btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .other-textarea {
      width: 100%;
      padding: 14px 18px;
      border-radius: 18px;
      border: 1px solid #e2d4ea;
      background: rgba(255,255,255,0.7);
      font-size: 0.9rem;
      color: #2e1e33;
      outline: none;
      resize: vertical;
      min-height: 80px;
      font-family: inherit;
    }
    .other-textarea::placeholder { color: #bcacc4; }
    .other-textarea:focus {
      border-color: #b983ff;
      box-shadow: 0 0 15px rgba(185,131,255,0.2);
    }
    .generate-btn {
      width: 100%;
      margin-top: 15px;
      padding: 15px;
      border-radius: 50px;
      background: linear-gradient(135deg, #b983ff, #e786a7);
      border: none;
      color: white;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 12px 25px rgba(185,131,255,0.35);
    }
    .generate-btn:hover {
      background: linear-gradient(135deg, #c595ff, #f090b5);
      transform: translateY(-2px);
      box-shadow: 0 18px 35px rgba(185,131,255,0.5);
    }
    .generate-btn:disabled { opacity: 0.5; transform: none; pointer-events: none; }
    select {
      width: 100%;
      padding: 12px 16px;
      border-radius: 30px;
      border: 1px solid #e2d4ea;
      background: rgba(255,255,255,0.7);
      font-size: 0.9rem;
      color: #2e1e33;
      outline: none;
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23b983ff' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 14px center;
      background-size: 16px;
    }
    .result-grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-height: 70vh;
      overflow-y: auto;
      padding-right: 6px;
    }
    .result-grid::-webkit-scrollbar { width: 5px; }
    .result-grid::-webkit-scrollbar-thumb { background: rgba(185,131,255,0.3); border-radius: 10px; }
    .card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      border-radius: 18px;
      padding: 18px;
      border: 1px solid rgba(200,170,210,0.35);
      transition: 0.3s;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .card:hover { border-color: #b983ff; box-shadow: 0 10px 25px rgba(185,131,255,0.18); transform: translateY(-2px); }
    .card-header { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .card-number {
      background: linear-gradient(135deg, #b983ff, #e786a7);
      color: white;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.75rem;
      flex-shrink: 0;
    }
    .card-badge { background: rgba(185,131,255,0.12); color: #7c3aed; font-size: 0.68rem; padding: 2px 8px; border-radius: 10px; font-weight: 600; white-space: nowrap; }
    .card-badge.green { background: rgba(134,200,167,0.15); color: #3d7a5c; }
    .prompt-text { font-size: 0.8rem; line-height: 1.6; color: #2e1e33; white-space: pre-wrap; word-break: break-word; background: rgba(245,235,250,0.4); padding: 12px; border-radius: 10px; flex: 1; }
    .copy-btn { align-self: flex-end; background: linear-gradient(135deg, #b983ff, #e786a7); border: none; color: white; padding: 7px 14px; border-radius: 24px; font-weight: 600; font-size: 0.75rem; cursor: pointer; transition: 0.2s; letter-spacing: 0.4px; }
    .copy-btn:hover { transform: scale(1.05); }
    .copy-btn.copied { background: #9b8aac; pointer-events: none; }
    .empty-state { text-align: center; padding: 50px 20px; color: #b0a0b5; font-size: 0.95rem; }
    @media (max-width: 1000px) {
      .main-layout { flex-direction: column; }
      .left-panel { max-width: 100%; position: static; max-height: none; }
      .right-panel { flex: 1; }
    }
  </style>
</head>
<body>
<div class="header">
  <h1>✨ 商业门头设计AI智能体</h1>
  <p>行业 · 风格 · 材质组合 · 布局时间 · 需求自定义</p>
</div>

<div class="main-layout">
  <div class="left-panel">
    <div class="brand-row">
      <label>🏷️ 品牌</label>
      <input id="brandInput" type="text" placeholder="例如：鲜果时光 / GLOW·LAB" value="GLOW·LAB">
    </div>
    <div class="subtitle-row">
      <label>📝 副标题</label>
      <input id="subtitleInput" type="text" placeholder="自定义或留空随机生成">
    </div>

    <!-- 行业分类 -->
    <div class="category-section">
      <div class="section-title">📌 行业分类 <span>必选</span></div>
      <div id="industryContainer">
        <div class="industry-block"><span class="industry-label">🍔 餐饮类</span><div class="sub-btn-group"><button class="option-btn sub-btn selected" data-value="快餐小吃" data-parent="餐饮类">快餐小吃</button><button class="option-btn sub-btn" data-value="火锅烤肉" data-parent="餐饮类">火锅烤肉</button><button class="option-btn sub-btn" data-value="咖啡奶茶" data-parent="餐饮类">咖啡奶茶</button><button class="option-btn sub-btn" data-value="甜品轻食" data-parent="餐饮类">甜品轻食</button><button class="option-btn sub-btn" data-value="特色餐饮" data-parent="餐饮类">特色餐饮</button><button class="option-btn sub-btn" data-value="面馆粉店" data-parent="餐饮类">面馆粉店</button></div></div>
        <div class="industry-block"><span class="industry-label">🛍️ 零售类</span><div class="sub-btn-group"><button class="option-btn sub-btn" data-value="服装店" data-parent="零售类">服装店</button><button class="option-btn sub-btn" data-value="美妆店" data-parent="零售类">美妆店</button><button class="option-btn sub-btn" data-value="饰品店" data-parent="零售类">饰品店</button><button class="option-btn sub-btn" data-value="便利店" data-parent="零售类">便利店</button><button class="option-btn sub-btn" data-value="手机数码店" data-parent="零售类">手机数码店</button><button class="option-btn sub-btn" data-value="家居杂货" data-parent="零售类">家居杂货</button></div></div>
        <div class="industry-block"><span class="industry-label">💇 生活服务类</span><div class="sub-btn-group"><button class="option-btn sub-btn" data-value="美容美发" data-parent="生活服务类">美容美发</button><button class="option-btn sub-btn" data-value="SPA养生" data-parent="生活服务类">SPA养生</button><button class="option-btn sub-btn" data-value="教育培训" data-parent="生活服务类">教育培训</button><button class="option-btn sub-btn" data-value="健身房" data-parent="生活服务类">健身房</button><button class="option-btn sub-btn" data-value="洗衣店" data-parent="生活服务类">洗衣店</button><button class="option-btn sub-btn" data-value="宠物店" data-parent="生活服务类">宠物店</button></div></div>
        <div class="industry-block"><span class="industry-label">🏢 商业连锁品牌</span><div class="sub-btn-group"><button class="option-btn sub-btn" data-value="连锁餐饮" data-parent="商业连锁品牌">连锁餐饮</button><button class="option-btn sub-btn" data-value="药店" data-parent="商业连锁品牌">药店</button><button class="option-btn sub-btn" data-value="超市" data-parent="商业连锁品牌">超市</button><button class="option-btn sub-btn" data-value="品牌旗舰店" data-parent="商业连锁品牌">品牌旗舰店</button><button class="option-btn sub-btn" data-value="连锁便利店" data-parent="商业连锁品牌">连锁便利店</button><button class="option-btn sub-btn" data-value="品牌专卖店" data-parent="商业连锁品牌">品牌专卖店</button></div></div>
        <div class="industry-block"><span class="industry-label">🏨 地产酒店会所</span><div class="sub-btn-group"><button class="option-btn sub-btn" data-value="售楼部" data-parent="地产酒店会所">售楼部</button><button class="option-btn sub-btn" data-value="酒店" data-parent="地产酒店会所">酒店</button><button class="option-btn sub-btn" data-value="民宿" data-parent="地产酒店会所">民宿</button><button class="option-btn sub-btn" data-value="会所" data-parent="地产酒店会所">会所</button><button class="option-btn sub-btn" data-value="高端商业空间" data-parent="地产酒店会所">高端商业空间</button><button class="option-btn sub-btn" data-value="展厅" data-parent="地产酒店会所">展厅</button></div></div>
        <div class="industry-block"><span class="industry-label">🌙 夜经济娱乐</span><div class="sub-btn-group"><button class="option-btn sub-btn" data-value="酒吧" data-parent="夜经济娱乐">酒吧</button><button class="option-btn sub-btn" data-value="KTV" data-parent="夜经济娱乐">KTV</button><button class="option-btn sub-btn" data-value="夜市" data-parent="夜经济娱乐">夜市</button><button class="option-btn sub-btn" data-value="电竞馆" data-parent="夜经济娱乐">电竞馆</button><button class="option-btn sub-btn" data-value="LiveHouse" data-parent="夜经济娱乐">LiveHouse</button><button class="option-btn sub-btn" data-value="剧本杀" data-parent="夜经济娱乐">剧本杀</button></div></div>
        <div class="industry-block"><span class="industry-label">🚗 汽车行业</span><div class="sub-btn-group"><button class="option-btn sub-btn" data-value="洗车店" data-parent="汽车行业">洗车店</button><button class="option-btn sub-btn" data-value="贴膜店" data-parent="汽车行业">贴膜店</button><button class="option-btn sub-btn" data-value="改装店" data-parent="汽车行业">改装店</button><button class="option-btn sub-btn" data-value="4S店" data-parent="汽车行业">4S店</button><button class="option-btn sub-btn" data-value="汽车美容" data-parent="汽车行业">汽车美容</button><button class="option-btn sub-btn" data-value="汽修店" data-parent="汽车行业">汽修店</button></div></div>
        <div class="industry-block"><span class="industry-label">🏥 医疗健康类</span><div class="sub-btn-group"><button class="option-btn sub-btn" data-value="口腔诊所" data-parent="医疗健康类">口腔诊所</button><button class="option-btn sub-btn" data-value="中医诊所" data-parent="医疗健康类">中医诊所</button><button class="option-btn sub-btn" data-value="医美机构" data-parent="医疗健康类">医美机构</button><button class="option-btn sub-btn" data-value="药店" data-parent="医疗健康类">药店</button><button class="option-btn sub-btn" data-value="体检中心" data-parent="医疗健康类">体检中心</button><button class="option-btn sub-btn" data-value="眼科诊所" data-parent="医疗健康类">眼科诊所</button></div></div>
      </div>
    </div>

    <!-- 门头风格/样式 -->
    <div class="category-section">
      <div class="section-title">🎨 门头风格 / 样式 <span>必选</span></div>
      <div class="style-btn-group" id="styleGroup">
        <button class="option-btn" data-value="网红门头">📸 网红门头</button><button class="option-btn" data-value="现代简约">▫️ 现代简约</button><button class="option-btn" data-value="现代传统">🏮 现代传统</button><button class="option-btn" data-value="国潮风">🐉 国潮风</button><button class="option-btn selected" data-value="轻奢风格">💎 轻奢风格</button><button class="option-btn" data-value="赛博朋克">🤖 赛博朋克</button><button class="option-btn" data-value="卡通风格">🐱 卡通风格</button><button class="option-btn" data-value="韩式清新">🌸 韩式清新</button><button class="option-btn" data-value="科技风格">🔬 科技风格</button><button class="option-btn" data-value="欧式风格">🏛️ 欧式风格</button><button class="option-btn" data-value="泰式东南亚">🌴 泰式东南亚</button><button class="option-btn" data-value="新中式">🍃 新中式</button><button class="option-btn" data-value="原木风格">🪵 原木风格</button><button class="option-btn" data-value="灯箱一体式">💠 灯箱一体式</button><button class="option-btn" data-value="异形创意">🌀 异形创意</button><button class="option-btn" data-value="多层叠加">📚 多层叠加</button><button class="option-btn" data-value="转角式创意">↗️ 转角式创意</button><button class="option-btn" data-value="格栅造型">📏 格栅造型</button><button class="option-btn" data-value="立体悬挑式">🧩 立体悬挑式</button><button class="option-btn" data-value="平面招牌式">🪧 平面招牌式</button><button class="option-btn" data-value="中式屋檐">🏯 中式屋檐</button>
      </div>
    </div>

    <!-- 门头材质系统（已删除发光系统） -->
    <div class="category-section">
      <div class="section-title">🧱 门头材质系统 <span>可多选组合</span></div>
      <div id="materialContainer">
        <div class="industry-block"><span class="industry-label">🔩 金属材质</span><div class="sub-btn-group"><button class="option-btn sub-btn selected" data-value="不锈钢" data-parent="金属材质">不锈钢</button><button class="option-btn sub-btn" data-value="黑钛金" data-parent="金属材质">黑钛金</button><button class="option-btn sub-btn" data-value="铝塑板" data-parent="金属材质">铝塑板</button><button class="option-btn sub-btn" data-value="铝单板" data-parent="金属材质">铝单板</button><button class="option-btn sub-btn" data-value="镀锌板" data-parent="金属材质">镀锌板</button><button class="option-btn sub-btn" data-value="铜板" data-parent="金属材质">铜板</button></div></div>
        <div class="industry-block"><span class="industry-label">🪵 木质系统</span><div class="sub-btn-group"><button class="option-btn sub-btn" data-value="防腐木" data-parent="木质系统">防腐木</button><button class="option-btn sub-btn" data-value="木饰面" data-parent="木质系统">木饰面</button><button class="option-btn sub-btn" data-value="原木板" data-parent="木质系统">原木板</button><button class="option-btn sub-btn" data-value="碳化木" data-parent="木质系统">碳化木</button><button class="option-btn sub-btn" data-value="竹木" data-parent="木质系统">竹木</button></div></div>
        <div class="industry-block"><span class="industry-label">🪨 石材系统</span><div class="sub-btn-group"><button class="option-btn sub-btn" data-value="岩板" data-parent="石材系统">岩板</button><button class="option-btn sub-btn" data-value="大理石" data-parent="石材系统">大理石</button><button class="option-btn sub-btn" data-value="微水泥" data-parent="石材系统">微水泥</button><button class="option-btn sub-btn" data-value="花岗岩" data-parent="石材系统">花岗岩</button><button class="option-btn sub-btn" data-value="水磨石" data-parent="石材系统">水磨石</button></div></div>
        <div class="industry-block"><span class="industry-label">🪟 玻璃系统</span><div class="sub-btn-group"><button class="option-btn sub-btn" data-value="长虹玻璃" data-parent="玻璃系统">长虹玻璃</button><button class="option-btn sub-btn" data-value="艺术玻璃" data-parent="玻璃系统">艺术玻璃</button><button class="option-btn sub-btn" data-value="钢化玻璃" data-parent="玻璃系统">钢化玻璃</button><button class="option-btn sub-btn" data-value="夹胶玻璃" data-parent="玻璃系统">夹胶玻璃</button><button class="option-btn sub-btn" data-value="磨砂玻璃" data-parent="玻璃系统">磨砂玻璃</button></div></div>
        <div class="industry-block"><span class="industry-label">📺 数字媒体系统</span><div class="sub-btn-group"><button class="option-btn sub-btn" data-value="LED屏" data-parent="数字媒体系统">LED屏</button><button class="option-btn sub-btn" data-value="全息屏" data-parent="数字媒体系统">全息屏</button><button class="option-btn sub-btn" data-value="动态广告屏" data-parent="数字媒体系统">动态广告屏</button><button class="option-btn sub-btn" data-value="透明屏" data-parent="数字媒体系统">透明屏</button><button class="option-btn sub-btn" data-value="互动屏幕" data-parent="数字媒体系统">互动屏幕</button></div></div>
        <div class="industry-block"><span class="industry-label">🎭 特殊造型材质</span><div class="sub-btn-group"><button class="option-btn sub-btn" data-value="格栅" data-parent="特殊造型材质">格栅</button><button class="option-btn sub-btn" data-value="冲孔板" data-parent="特殊造型材质">冲孔板</button><button class="option-btn sub-btn" data-value="霓虹灯" data-parent="特殊造型材质">霓虹灯</button><button class="option-btn sub-btn" data-value="艺术装置" data-parent="特殊造型材质">艺术装置</button><button class="option-btn sub-btn" data-value="透光膜" data-parent="特殊造型材质">透光膜</button><button class="option-btn sub-btn" data-value="3D打印造型" data-parent="特殊造型材质">3D打印造型</button></div></div>
      </div>
    </div>

    <!-- 新增：门头布局方向 -->
    <div class="category-section">
      <div class="section-title">📐 门头布局 <span>必选</span></div>
      <div class="style-btn-group" id="layoutGroup">
        <button class="option-btn selected" data-value="横向超宽">📏 横向超宽</button>
        <button class="option-btn" data-value="竖向">📐 竖向</button>
        <button class="option-btn" data-value="多层">📚 多层</button>
        <button class="option-btn" data-value="叠加">🪜 叠加</button>
      </div>
    </div>

    <!-- 新增：白天/黑夜场景 -->
    <div class="category-section">
      <div class="section-title">🌗 时间场景</div>
      <div class="style-btn-group" id="timeGroup">
        <button class="option-btn selected" data-value="白天">☀️ 白天</button>
        <button class="option-btn" data-value="黑夜">🌙 黑夜</button>
      </div>
    </div>

    <div class="category-section">
      <div class="section-title">📍 商圈环境</div>
      <select id="districtSelect">
        <option value="不限">🌐 不限（随机匹配）</option><option value="高端购物中心">高端购物中心</option><option value="临街独立商铺">临街独立商铺</option><option value="步行街">步行街</option><option value="社区底商">社区底商</option><option value="百货商场一层">百货商场一层</option><option value="艺术园区">艺术园区</option><option value="交通枢纽">交通枢纽</option><option value="地下商业街">地下商业街</option>
      </select>
    </div>

    <div class="category-section">
      <div class="section-title">💬 其他需求描述</div>
      <textarea id="otherInput" class="other-textarea" placeholder="例如：需要突出霓虹效果，主色调暖黄…"></textarea>
    </div>

    <button class="generate-btn" id="generateBtn">⚡ 生成20组结构化提示词</button>
  </div>

  <div class="right-panel">
    <div class="right-header">
      <h3>📋 生成结果</h3>
      <span class="stats-badge" id="statsBadge">等待生成</span>
    </div>
    <div class="result-grid" id="resultsGrid">
      <div class="empty-state">👈 在左侧配置选项，点击生成</div>
    </div>
  </div>
</div>

<script>
  (function() {
    const system = {
      场景: ['高端购物中心一层','临街独立商铺','核心商圈步行街','社区底商业态','百货商场一层','艺术园区体验店','交通枢纽快闪店','地下商业街入口'],
      品牌口号库: {
        '餐饮类': ['烟火气十足','一口上瘾','深夜不打烊','排队王门店','味道传承','舌尖上的美味'],
        '零售类': ['潮流由我','定义你的美','品质生活','新鲜每一刻','风格即态度','发现好物'],
        '生活服务类': ['生活更简单','贴心每一刻','品质日常','专业成就卓越','呵护每一位','用心服务'],
        '商业连锁品牌': ['值得信赖','品质保证','全国连锁','专业之选','始终如一','品牌力量'],
        '地产酒店会所': ['尊享品质','一席品东方','奢享人生','极致体验','归家即是度假','身份象征'],
        '夜经济娱乐': ['越夜越火爆','释放真我','快乐不设限','玩转新体验','今夜不寂寞','潮流聚集地'],
        '汽车行业': ['专业改装','极致工艺','酷炫出行','品质养护','速度与激情','爱车如新'],
        '医疗健康类': ['专业安心','呵护健康','科学护肤新标杆','精准医疗','值得托付','健康每一天']
      }
    };

    // 视角基础约束（不再包含固定横向超宽描述）
    const basePerspective = [
      '必须100%正面平视拍摄',
      '镜头与门头立面完全垂直',
      '禁止侧拍/斜拍/45度视角',
      '禁止透视变形',
      '建筑左右完全对称构图',
      '商业街真实立面视角',
      '行人视角高度拍摄'
    ];

    // 布局对应的附加描述
    const layoutDesc = {
      '横向超宽': '横向超宽大幅面门头，弱化竖向分割，强化水平延伸感，广角平视视角，展示完整门头宽度，整体开阔舒展大气，画面比例16:9',
      '竖向': '竖向延伸门头，强调垂直视觉，挺拔高耸，适合较窄铺面，画面比例9:16',
      '多层': '多层叠加结构，层次丰富，前后景深，立体感强',
      '叠加': '叠加式造型，多种材质/形状上下或前后叠加，形成复合视觉层次'
    };

    function initSingleSelect(containerId) {
      const container = document.getElementById(containerId);
      if (!container) return;
      container.addEventListener('click', (e) => {
        const btn = e.target.closest('.option-btn');
        if (!btn) return;
        container.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
      });
    }

    function initMultiSelect(containerId) {
      const container = document.getElementById(containerId);
      if (!container) return;
      container.addEventListener('click', (e) => {
        const btn = e.target.closest('.option-btn');
        if (!btn) return;
        btn.classList.toggle('selected');
      });
    }

    function getSelected(containerId) {
      const container = document.getElementById(containerId);
      const sel = container ? container.querySelector('.option-btn.selected') : null;
      return sel ? sel.getAttribute('data-value') : '';
    }

    function getMultiSelected(containerId) {
      const container = document.getElementById(containerId);
      const selected = container ? container.querySelectorAll('.option-btn.selected') : [];
      const values = [];
      const parents = new Set();
      selected.forEach(b => {
        values.push(b.getAttribute('data-value'));
        parents.add(b.getAttribute('data-parent'));
      });
      return { values, parents: Array.from(parents) };
    }

    const r = arr => arr[Math.floor(Math.random() * arr.length)];

    function buildPrompt(brand, subtitle, industryParent, industryVal, style, materialInfo, layout, time, district, otherDesc) {
      const materialValues = materialInfo.values.length > 0 ? materialInfo.values : ['不锈钢'];
      const materialStr = materialValues.join(' + ');
      const materialParents = materialInfo.parents.length > 0 ? materialInfo.parents.join('·') : '金属材质';

      const slogans = system.品牌口号库[industryParent] || system.品牌口号库['餐饮类'];
      const scene = district === '不限' ? r(system.场景) : district;
      const slogan = subtitle.trim() !== '' ? subtitle.trim() : r(slogans);

      // 构建视角描述
      let perspective = [...basePerspective];
      if (layout && layoutDesc[layout]) {
        perspective.push(layoutDesc[layout]);
      }
      // 根据时间添加光线描述
      let timeDesc = '';
      if (time === '白天') {
        timeDesc = '自然光照明，通透日景效果，突出材质与色彩';
      } else if (time === '黑夜') {
        timeDesc = '夜景灯光效果，发光字/灯箱突出，氛围照明，暖色或霓虹光';
      }

      let prompt = `【商业门头设计】

品牌：${brand}${subtitle ? ' · ' + subtitle : ''}
行业：${industryParent}·${industryVal}
风格：${style}
场景：${scene}

材质系统：${materialParents}
材质组合：${materialStr}
布局：${layout || '横向超宽'}
时间：${time || '白天'}
${timeDesc ? '光照：' + timeDesc : ''}

品牌口号：${slogan}`;

      if (otherDesc && otherDesc.trim() !== '') {
        prompt += `

💬 其他需求：
${otherDesc.trim()}`;
      }

      prompt += `

🔒 视角与构图：
${perspective.join('，')}

🎯 核心要求：
完全正立面展示，商业街实体门头，可落地施工，5秒远距离识别`;

      return prompt;
    }

    function generate20(brand, subtitle, industryParent, industryVal, style, materialInfo, layout, time, district, otherDesc) {
      const set = new Set();
      const result = [];
      let safety = 0;
      while (result.length < 20 && safety < 800) {
        const prompt = buildPrompt(brand, subtitle, industryParent, industryVal, style, materialInfo, layout, time, district, otherDesc);
        if (!set.has(prompt)) {
          set.add(prompt);
          result.push(prompt);
        }
        safety++;
      }
      return result;
    }

    function generatePrompts() {
      const brandInput = document.getElementById('brandInput');
      const subtitleInput = document.getElementById('subtitleInput');
      const otherInput = document.getElementById('otherInput');
      const districtSelect = document.getElementById('districtSelect');
      const resultsGrid = document.getElementById('resultsGrid');
      const statsBadge = document.getElementById('statsBadge');
      const generateBtn = document.getElementById('generateBtn');

      const brand = brandInput.value.trim();
      if (!brand) { alert('请输入品牌名称'); return; }
      const subtitle = subtitleInput.value.trim();
      const otherDesc = otherInput.value.trim();
      const district = districtSelect.value;

      // 行业单选
      const industryContainer = document.getElementById('industryContainer');
      const industrySel = industryContainer ? industryContainer.querySelector('.sub-btn.selected') : null;
      if (!industrySel) { alert('请选择一个行业子类'); return; }
      const industryVal = industrySel.getAttribute('data-value');
      const industryParent = industrySel.getAttribute('data-parent');

      // 风格单选
      const style = getSelected('styleGroup');

      // 材质多选
      const materialInfo = getMultiSelected('materialContainer');
      if (materialInfo.values.length === 0) { alert('请至少选择一个材质子类'); return; }

      // 布局单选
      const layout = getSelected('layoutGroup') || '横向超宽';
      // 时间单选
      const time = getSelected('timeGroup') || '白天';

      generateBtn.disabled = true;
      generateBtn.textContent = '⏳ 生成中...';
      resultsGrid.innerHTML = '<div class="empty-state">⏳ 正在智能组合20组不重复提示词...</div>';

      setTimeout(() => {
        try {
          const prompts = generate20(brand, subtitle, industryParent, industryVal, style, materialInfo, layout, time, district, otherDesc);
          window.DATA = prompts;

          resultsGrid.innerHTML = '';
          prompts.forEach((text, idx) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
              <div class="card-header">
                <div class="card-number">${idx+1}</div>
                <span class="card-badge">${industryParent}·${industryVal}</span>
                <span class="card-badge green">${materialInfo.values.join('+')}</span>
                <span class="card-badge">${style}</span>
                <span class="card-badge">${layout}</span>
                <span class="card-badge">${time}</span>
              </div>
              <div class="prompt-text">${text}</div>
              <button class="copy-btn" data-index="${idx}">📋 复制</button>
            `;
            resultsGrid.appendChild(card);
          });

          document.querySelectorAll('.copy-btn').forEach(btn => {
            btn.addEventListener('click', function() {
              const i = parseInt(this.getAttribute('data-index'));
              const txt = window.DATA[i];
              if (navigator.clipboard?.writeText) {
                navigator.clipboard.writeText(txt).then(() => {
                  this.textContent = '✓ 已复制';
                  this.classList.add('copied');
                  setTimeout(() => { this.textContent = '📋 复制'; this.classList.remove('copied'); }, 1500);
                }).catch(() => fallbackCopy(this, txt));
              } else {
                fallbackCopy(this, txt);
              }
            });
          });

          statsBadge.textContent = `✅ 20组 | ${industryVal} | ${style} | ${layout} | ${time}`;
        } catch (e) {
          console.error(e);
          resultsGrid.innerHTML = '<div class="empty-state">❌ 生成失败，请重试</div>';
        } finally {
          generateBtn.disabled = false;
          generateBtn.textContent = '⚡ 生成20组结构化提示词';
        }
      }, 80);
    }

    function fallbackCopy(btn, text) {
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      btn.textContent = '✓ 已复制';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '📋 复制'; btn.classList.remove('copied'); }, 1500);
    }

    // 初始化各选择组
    initSingleSelect('industryContainer'); // 行业单选
    initMultiSelect('materialContainer'); // 材质多选
    initSingleSelect('styleGroup'); // 风格单选
    initSingleSelect('layoutGroup'); // 布局单选
    initSingleSelect('timeGroup'); // 时间单选

    document.getElementById('generateBtn').addEventListener('click', generatePrompts);
    window.addEventListener('DOMContentLoaded', () => generatePrompts());
    window.generatePrompts = generatePrompts;
  })();
</script>
</body>
</html>
